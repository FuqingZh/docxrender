name: py-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  py:
    runs-on: ubuntu-latest
    env:
      PDM_IGNORE_SAVED_PYTHON: "1"
      PDM_VENV_IN_PROJECT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install tooling
        run: python -m pip install -U pip pdm

      - name: Install dependencies
        run: pdm sync -G dev --no-self

      - name: Show Python executable
        run: pdm run python -c "import sys; print(sys.executable)"

      - name: Lint
        run: pdm run ruff check .

      - name: Type check
        run: pdm run pyright

      - name: Unit tests
        run: pdm run python -m unittest discover -v

      - name: Clean local packaging artifacts
        run: |
          rm -rf __pypackages__ .pdm-build .pytest_cache .ruff_cache dist build

      - name: Build package artifacts
        run: pdm build

      - name: Check package metadata
        run: pdm run twine check dist/*

      - name: Install built wheel and smoke import
        run: |
          python -m venv /tmp/docxrender-wheel-venv
          /tmp/docxrender-wheel-venv/bin/python -m pip install -U pip
          /tmp/docxrender-wheel-venv/bin/python -m pip install dist/*.whl
          /tmp/docxrender-wheel-venv/bin/python - <<'PY'
          from docxrender import DocxWriter, write_docx

          assert DocxWriter().style.sizes.pt_body == 12.0
          assert callable(write_docx)
          print("docxrender wheel import ok")
          PY
