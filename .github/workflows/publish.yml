name: py-publish

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: py-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dist:
    runs-on: ubuntu-latest
    env:
      PDM_IGNORE_SAVED_PYTHON: "1"
      PDM_VENV_IN_PROJECT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install tooling
        run: python -m pip install -U pip pdm packaging

      - name: Verify tag is canonical PEP 440
        if: github.ref_type == 'tag'
        run: |
          python - <<'PY'
          from packaging.version import InvalidVersion, Version

          raw_tag = "${{ github.ref_name }}"

          if raw_tag.startswith("v") or raw_tag.startswith("py-v"):
              raise SystemExit(
                  "Tag must be plain PEP 440 version "
                  f"(e.g. 0.1.0), got {raw_tag!r}."
              )

          try:
              parsed = Version(raw_tag)
          except InvalidVersion as exc:
              raise SystemExit(f"Invalid PEP 440 tag: {raw_tag!r}") from exc

          if str(parsed) != raw_tag:
              raise SystemExit(
                  "Tag must already be canonical PEP 440, "
                  f"got {raw_tag!r}, canonical={str(parsed)!r}."
              )

          print(f"Tag check passed: {raw_tag}")
          PY

      - name: Install dependencies
        run: pdm sync -G dev --no-self

      - name: Lint
        run: pdm run ruff check .

      - name: Type check
        run: pdm run pyright

      - name: Unit tests
        run: pdm run python -m unittest discover -v

      - name: Clean local packaging artifacts
        run: |
          rm -rf __pypackages__ .pdm-build .pytest_cache .ruff_cache dist build

      - name: Build package artifacts
        run: pdm build

      - name: Check package metadata
        run: pdm run twine check dist/*

      - name: Verify built package can be installed
        run: |
          python -m venv /tmp/docxrender-wheel-venv
          /tmp/docxrender-wheel-venv/bin/python -m pip install -U pip
          /tmp/docxrender-wheel-venv/bin/python -m pip install dist/*.whl
          /tmp/docxrender-wheel-venv/bin/python - <<'PY'
          from docxrender import DocxWriter, convert_docx_to_pdf, write_docx

          assert DocxWriter().style.sizes.pt_body == 12.0
          assert callable(write_docx)
          assert callable(convert_docx_to_pdf)
          print("docxrender wheel import ok")
          PY

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-dist-main
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    needs: build-dist
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/docxrender
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: py-dist-main
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
          attestations: false
          verbose: true

  publish-pypi:
    needs: build-dist
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/docxrender
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: py-dist-main
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: dist
          skip-existing: true
